name: Auto Blog Writer (Yahavi)

# Writes blog posts from content/blog-queue.json using up to 10 Groq API keys
# in parallel. Skips duplicates, persists state, auto-cools-down rate-limited
# keys, and resumes on the next run.

on:
  schedule:
    # Every 4 hours — 6 runs/day × up to 10 blogs/run = 60 blogs/day theoretical max
    - cron: "7 */4 * * *"
  workflow_dispatch:
    inputs:
      max_per_run:
        description: "Max blogs to write this run (overrides default 10)"
        required: false
        default: "10"

permissions:
  contents: write

concurrency:
  group: auto-blog
  cancel-in-progress: false

jobs:
  write-blogs:
    name: Generate + commit blogs
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run auto-blog generator
        env:
          GROQ_API_KEY_1: ${{ secrets.GROQ_API_KEY_1 }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3: ${{ secrets.GROQ_API_KEY_3 }}
          GROQ_API_KEY_4: ${{ secrets.GROQ_API_KEY_4 }}
          GROQ_API_KEY_5: ${{ secrets.GROQ_API_KEY_5 }}
          GROQ_API_KEY_6: ${{ secrets.GROQ_API_KEY_6 }}
          GROQ_API_KEY_7: ${{ secrets.GROQ_API_KEY_7 }}
          GROQ_API_KEY_8: ${{ secrets.GROQ_API_KEY_8 }}
          GROQ_API_KEY_9: ${{ secrets.GROQ_API_KEY_9 }}
          GROQ_API_KEY_10: ${{ secrets.GROQ_API_KEY_10 }}
          BLOG_MAX_PER_RUN: ${{ github.event.inputs.max_per_run || '10' }}
        run: node scripts/auto-blog/run.mjs

      - name: Commit + push generated blogs
        run: |
          git config user.name "Yahavi Auto-Blogger"
          git config user.email "noreply@hackknow.com"
          git add -A app/src/content/blog/ content/blog-state.json content/blog-queue.json
          if git diff --cached --quiet; then
            echo "No new blogs to commit (queue may be empty or all keys cooling down)."
            exit 0
          fi
          STAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          git commit -m "blog: auto-generated ${STAMP}

          🌊 Generated by Yahavi auto-blog pipeline
          Run: ${{ github.run_id }}"
          git push
