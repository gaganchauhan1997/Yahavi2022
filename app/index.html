<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- Primary SEO -->
    <title>Hackknow – Premium Digital Products Marketplace India</title>
    <meta name="description" content="Buy premium digital products – Excel dashboards, PowerPoint templates, marketing kits, and more. India's trusted digital marketplace. Instant download after payment." />
    <meta name="keywords" content="digital products India, Excel templates, PowerPoint templates, digital marketplace, buy templates online, dashboards, spreadsheets" />
    <meta name="author" content="Hackknow" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />

    <!-- Canonical -->
    <link rel="canonical" href="https://www.hackknow.com/" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://www.hackknow.com/" />
    <meta property="og:site_name"   content="Hackknow" />
    <meta property="og:title"       content="Hackknow – Premium Digital Products Marketplace" />
    <meta property="og:description" content="Buy premium Excel, PowerPoint &amp; marketing templates. Instant download. India's leading digital marketplace." />
    <meta property="og:image"       content="https://www.hackknow.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale"     content="en_IN" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@hackknow" />
    <meta name="twitter:title"       content="Hackknow – Premium Digital Products Marketplace" />
    <meta name="twitter:description" content="Buy premium Excel, PowerPoint &amp; marketing templates. Instant download. India's leading digital marketplace." />
    <meta name="twitter:image"       content="https://www.hackknow.com/og-image.jpg" />

    <!-- Theme / PWA -->
    <meta name="theme-color" content="#FFF055" />
    <meta name="msapplication-TileColor" content="#1A1A1A" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Favicon -->
    <link rel="icon"             type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon"   type="image/x-icon"  href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180"      href="/apple-touch-icon.png" />

    <!-- Preconnect to critical origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://checkout.razorpay.com" />

    <!-- DNS prefetch for secondary origins -->
    <link rel="dns-prefetch" href="https://accounts.google.com" />
    <link rel="dns-prefetch" href="https://api.razorpay.com" />
    <link rel="dns-prefetch" href="https://apis.google.com" />
    <link rel="dns-prefetch" href="https://lh3.googleusercontent.com" />

    <!-- Preload LCP hero image (desktop) -->
    <link rel="preload" as="image" href="/images/hero/phone-mockup.webp"
          type="image/webp" media="(min-width: 1024px)" fetchpriority="high" />

    <!-- Google Fonts — async load (does not block render) -->
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap"
          media="print" onload="this.media='all'" />
    <noscript>
      <link rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap" />
    </noscript>

    <!-- Google Sign-In SDK — deferred until browser is idle (login/signup pages only need this) -->
    <script>
    (function(){
      var load = function(){
        var s = document.createElement('script');
        s.src = 'https://accounts.google.com/gsi/client';
        s.async = true;
        document.head.appendChild(s);
      };
      if ('requestIdleCallback' in window) {
        requestIdleCallback(load, { timeout: 4000 });
      } else {
        setTimeout(load, 3000);
      }
    })();
    </script>

    <!-- JSON-LD structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Hackknow",
      "url": "https://www.hackknow.com",
      "logo": "https://www.hackknow.com/favicon.svg",
      "description": "India's premium digital products marketplace.",
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "support@hackknow.com",
        "contactType": "customer service",
        "availableLanguage": ["English", "Hindi"]
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "url": "https://www.hackknow.com",
      "name": "Hackknow",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://www.hackknow.com/products?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
