# IPv4-only resolver — Hostinger has IPv6 addresses but GCE lacks IPv6 routing
resolver 8.8.8.8 8.8.4.4 valid=300s ipv6=off;
resolver_timeout 5s;

# HTTP → HTTPS + www
server {
    listen 80;
    server_name hackknow.com www.hackknow.com;
    return 301 https://www.hackknow.com$request_uri;
}

# Bare HTTPS (hackknow.com without www) → redirect to www
server {
    listen 443 ssl http2;
    server_name hackknow.com;

    ssl_certificate     /etc/letsencrypt/live/hackknow.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hackknow.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    return 301 https://www.hackknow.com$request_uri;
}

# Main site — www only
server {
    listen 443 ssl http2;
    server_name www.hackknow.com;

    ssl_certificate     /etc/letsencrypt/live/hackknow.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hackknow.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    root  /var/www/hackknow/dist;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml application/rss+xml image/svg+xml image/png image/jpeg font/woff font/woff2;

    # ── WooCommerce REST API (IPv4 hardcoded — avoids IPv6 failure) ──────────
    location ^~ /wp-json/ {
        proxy_pass          https://145.223.124.144/wp-json/;
        proxy_http_version  1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name      shop.hackknow.com;
        proxy_set_header    Host shop.hackknow.com;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto https;
        proxy_read_timeout  30s;
        proxy_connect_timeout 10s;
        proxy_hide_header   Access-Control-Allow-Origin;
        add_header          Access-Control-Allow-Origin "$http_origin" always;
        add_header          Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header          Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
        add_header          Access-Control-Allow-Credentials "true" always;
        if ($request_method = OPTIONS) { return 204; }
    }

    # ── WPGraphQL ────────────────────────────────────────────────────────────
    location ^~ /graphql {
        proxy_pass          https://145.223.124.144/graphql;
        proxy_http_version  1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name      shop.hackknow.com;
        proxy_set_header    Host shop.hackknow.com;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto https;
        proxy_read_timeout  30s;
        proxy_connect_timeout 10s;
        proxy_hide_header   Access-Control-Allow-Origin;
        add_header          Access-Control-Allow-Origin "$http_origin" always;
        add_header          Access-Control-Allow-Methods "POST, GET, OPTIONS" always;
        add_header          Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
        if ($request_method = OPTIONS) { return 204; }
    }

    # ── WP Media / Product images (so shop.hackknow.com is never exposed) ───
    location ^~ /wp-content/ {
        proxy_pass          https://145.223.124.144/wp-content/;
        proxy_http_version  1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name      shop.hackknow.com;
        proxy_set_header    Host shop.hackknow.com;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto https;
        proxy_read_timeout  15s;
        proxy_connect_timeout 10s;
        # Long cache for static media
        add_header          Cache-Control "public, max-age=2592000" always;
        access_log off;
    }

    # ── GitHub webhook (internal) ────────────────────────────────────────────
    location ^~ /github-webhook {
        proxy_pass         http://127.0.0.1:9000/github-webhook;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Immutable hashed assets (JS/CSS bundles) ─────────────────────────────
    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    # ── Product/hero images stored locally ───────────────────────────────────
    location ^~ /images/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
        access_log off;
    }

    # ── Static files ─────────────────────────────────────────────────────────
    location ~* \.(webmanifest|xml|txt)$ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400" always;
        access_log off;
    }

    location ~* \.(ico|svg|png|jpg|jpeg|webp|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
        access_log off;
    }

    # ── SPA — all routes serve index.html ────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options           "SAMEORIGIN" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
        add_header Cache-Control             "no-store, no-cache, must-revalidate" always;
    }
}
