server {
    server_name tdm.hackknow.com;
    root /var/www/hackknow-tdm/current;
    index index.html;

    # ── Security baseline ────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # CSP — TDM is BYOK SPA, calls user-provided AI endpoints + own SSO bridge
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://api.openai.com https://api.anthropic.com https://api.x.ai https://generativelanguage.googleapis.com https://openrouter.ai https://api.deepseek.com https://api.groq.com https://www.hackknow.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests" always;

    # ── Compression ──────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml font/woff font/woff2 application/manifest+json;

    # ── Hashed immutable assets — single Cache-Control header ────────────────
    location ~* ^/assets/.*\.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp|avif)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
    }

    # ── Other static assets (root-level icons, manifest) — short cache ───────
    location ~* \.(ico|png|jpg|jpeg|gif|webp|svg|woff2?|ttf)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=86400" always;
        access_log off;
    }

    # ── SPA index — never cache (always fetch fresh, hashed assets cached) ──
    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate" always;
    }
    location = / {
        add_header Cache-Control "no-store, must-revalidate" always;
        try_files /index.html =404;
    }

    # ── SPA fallback ────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/tdm.hackknow.access.log;
    error_log  /var/log/nginx/tdm.hackknow.error.log warn;

    listen [::]:443 ssl ipv6only=on http2;
    listen 443 ssl http2;
    ssl_certificate /etc/letsencrypt/live/tdm.hackknow.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tdm.hackknow.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = tdm.hackknow.com) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    listen [::]:80;
    server_name tdm.hackknow.com;
    return 404;
}
