# NGINX Configuration for Hackknow — GCE Free Tier (e2-micro)
# Updated: patch P5

gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css text/xml text/javascript
           application/json application/javascript application/xml+rss
           application/atom+xml image/svg+xml font/woff2 font/woff font/ttf;
gzip_min_length 1000;

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hackknow.com www.hackknow.com;

    root /var/www/hackknow/dist;
    index index.html;

    client_max_body_size 25m;

    # TLS
    ssl_certificate /etc/letsencrypt/live/hackknow.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hackknow.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://checkout.razorpay.com 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://lumberjack.razorpay.com https://api.razorpay.com; frame-src https://api.razorpay.com https://checkout.razorpay.com;" always;

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, must-revalidate, max-age=60" always;
    }

    # Static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header Vary "Accept-Encoding" always;
        access_log off;
        try_files $uri =404;
    }

    # Fonts — CORS
    location ~* \.(woff2?|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Vary "Accept-Encoding" always;
        access_log off;
    }

    # API/GraphQL proxy to WP backend (hides shop.hackknow.com)
    location ~ ^/(graphql|wp-json) {
        expires off;
        add_header Cache-Control "no-store" always;
        proxy_pass https://shop.hackknow.com;
        proxy_ssl_server_name on;
        proxy_set_header Host shop.hackknow.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WordPress media proxy
    location /wp-content/ {
        proxy_pass https://shop.hackknow.com/wp-content/;
        proxy_ssl_server_name on;
        proxy_set_header Host shop.hackknow.com;
        expires 7d;
        add_header Cache-Control "public" always;
    }

    # Deploy webhook — only from localhost (Node listener)
    location = /deploy/github-webhook {
        proxy_pass http://127.0.0.1:9000/webhook;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Hub-Signature-256 $http_x_hub_signature_256;
        allow 127.0.0.1;
        allow ::1;
        deny all;
    }

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html { root /var/www/hackknow/dist; }
}

server {
    listen 80;
    listen [::]:80;
    server_name hackknow.com www.hackknow.com;
    return 301 https://$server_name$request_uri;
}
